services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB: agentic_rpg
      POSTGRES_USER: agentic_rpg
      POSTGRES_PASSWORD: agentic_rpg
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  ollama:
    image: 'ollama/ollama:latest'
    ports:
      - '11434:11434'

volumes:
  postgres-data:
  redis-data: