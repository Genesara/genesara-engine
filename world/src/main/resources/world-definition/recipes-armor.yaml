      required-station: CRAFTING_STATION_WOOD
      required-skill: CARPENTRY
      required-skill-level: 0
      stamina-cost: 10

    # ───────────────────────── T2 iron (forge / SMITHING) ─────────────────────────

    IRON_HELM_BASIC:
      output: { item: IRON_HELM, quantity: 1 }
      inputs:
        IRON_INGOT: 2
      required-station: CRAFTING_STATION_METAL
      required-skill: SMITHING
      required-skill-level: 5
      stamina-cost: 16

    IRON_CHESTPLATE_BASIC:
      output: { item: IRON_CHESTPLATE, quantity: 1 }
      inputs:
        IRON_INGOT: 4
      required-station: CRAFTING_STATION_METAL
      required-skill: SMITHING
