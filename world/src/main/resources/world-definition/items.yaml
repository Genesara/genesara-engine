items:
  catalog:

    # ───────────────────────── Renewable organics ─────────────────────────

    WOOD:
      display-name: Wood
      description: >-
        Rough timber gathered from forest nodes. Used for low-tier crafting and fuel.
      category: RESOURCE
      weight-per-unit: 800
      max-stack: 200
      regenerating: true
      regen-interval-ticks: 500
      regen-amount: 5
      gathering-skill: LUMBERJACKING

    BERRY:
      display-name: Wild Berries
      description: >-
        Edible forage. Restores a small amount of hunger when consumed. Found in
        forest and plains nodes.
      category: RESOURCE
      weight-per-unit: 50
      max-stack: 200
      regenerating: true
      regen-interval-ticks: 100
      regen-amount: 5
      gathering-skill: FORAGING
      consumable:
        gauge: HUNGER
        amount: 20

    HERB:
      display-name: Wild Herb
      description: >-
        Medicinal plant. Useful as an alchemy reagent or as a low-tier consumable.
        Common in forest, plains, and wetland biomes.
      category: RESOURCE
      weight-per-unit: 30
      max-stack: 200
      regenerating: true
      regen-interval-ticks: 100
      regen-amount: 5
      gathering-skill: FORAGING
      consumable:
        gauge: HUNGER
        amount: 10

    MUSHROOM:
      display-name: Wild Mushroom
      description: >-
        Edible fungi from damp forest floors and swamps. Decent hunger restore;
        regenerates quickly under shade.
      category: RESOURCE
      weight-per-unit: 40
      max-stack: 200
      regenerating: true
      regen-interval-ticks: 100
      regen-amount: 5
      gathering-skill: FORAGING
      consumable:
        gauge: HUNGER
        amount: 15

    FISH:
      display-name: Fish
      description: >-
        Caught from coastal waters and river deltas. Dense calories — the best
        wild food source by hunger refilled per unit.
      category: RESOURCE
      weight-per-unit: 300
      max-stack: 100
      regenerating: true
      regen-interval-ticks: 200
      regen-amount: 3
      gathering-skill: FISHING
      consumable:
        gauge: HUNGER
        amount: 30

    HIDE:
      display-name: Hide
      description: >-
        Tough animal hide. Drops from fauna NPC kills (see #20 Phase 2 — NPCs).
        Not gatherable from terrain; the leather chain is dormant in v1 until
        the hunting verb lands.
      category: RESOURCE
      weight-per-unit: 600
      max-stack: 100
      regenerating: false

    FIBER:
      display-name: Plant Fiber
      description: >-
        Coarse plant fiber stripped from inner bark. Refined at a workbench
        from raw WOOD; not gatherable directly from terrain.
      category: RESOURCE
      weight-per-unit: 100
      max-stack: 200
      regenerating: false

    # ───────────────────── Renewable building / fuel ──────────────────────

    CLAY:
      display-name: Clay
      description: >-
        Wet earth from riverbanks and wetlands. Used for low-tier construction and
        ceramics. Slowly recovers as river sediment settles.
      category: RESOURCE
      weight-per-unit: 1200
      max-stack: 100
      regenerating: true
      regen-interval-ticks: 500
      regen-amount: 4
      gathering-skill: MINING

    PEAT:
      display-name: Peat
      description: >-
        Compressed organic matter cut from swamps and wetlands. Burns hot and slow;
        a fuel for forges and fires.
      category: RESOURCE
      weight-per-unit: 600
      max-stack: 150
      regenerating: true
      regen-interval-ticks: 800
      regen-amount: 3
      gathering-skill: MINING

    SAND:
      display-name: Sand
      description: >-
        Loose mineral grains from deserts and shorelines. A future glasswork
        material; replenishes very slowly via wind and tide.
      category: RESOURCE
      weight-per-unit: 1500
      max-stack: 100
      regenerating: true
      regen-interval-ticks: 2000
      regen-amount: 2
      gathering-skill: MINING

    # ─────────────────── Non-regenerating geological ──────────────────────

    STONE:
      display-name: Stone
      description: >-
        Loose rocks gathered from mountain and ruin nodes. Mined cleanly with the
        right skill; gathered roughly without one. Once stripped, the deposit is
        gone — geology is slow.
      category: RESOURCE
      weight-per-unit: 1500
      max-stack: 100
      regenerating: false
      gathering-skill: MINING

    ORE:
      display-name: Ore
      description: >-
        Raw metal-bearing ore. Smelts into ingots at a forge. Mountain and volcanic
        biomes. Non-renewable: rich nodes are a finite advantage.
      category: RESOURCE
      weight-per-unit: 2000
      max-stack: 50
      regenerating: false
      gathering-skill: MINING

    COAL:
      display-name: Coal
      description: >-
        Bituminous fuel from mountain seams and volcanic flows. Required for
        higher-tier forges. Non-renewable.
      category: RESOURCE
      weight-per-unit: 1800
      max-stack: 80
      regenerating: false
      gathering-skill: MINING

    GEM:
      display-name: Gemstone
      description: >-
        Rare crystalline deposit from caves and deep mountain pockets. High value
        per unit; sparse and non-renewable.
      category: RESOURCE
      weight-per-unit: 200
      max-stack: 30
      regenerating: false
      gathering-skill: MINING

    SALT:
      display-name: Salt
      description: >-
        Mineral salt from salt flats and rare coastal evaporite pockets. Used for
        food preservation. Non-renewable on a meaningful scale.
      category: RESOURCE
      weight-per-unit: 1000
      max-stack: 100
      regenerating: false
      gathering-skill: MINING

    # ────────────────── Refined intermediates (craftable) ─────────────────
    # These exist only as outputs of the crafting layer (#8). They are RESOURCE
    # category — stackable in agent_inventory, no rarity / durability — and feed
    # T2 equipment recipes. They are also forward-compatible inputs to future
    # T2/T3 building recipes; the building catalog stays unchanged in this slice.

    IRON_INGOT:
      display-name: Iron Ingot
      description: >-
        Smelted iron bar from ore + coal at a forge. The metal substrate for
        T2 weapons, armor, and jewelry recipes.
      category: RESOURCE
      weight-per-unit: 1500
      max-stack: 50
      regenerating: false

    LEATHER:
      display-name: Leather
      description: >-
        Tanned hide ready for stitching. Substrate for T1 armor and bracelet
        recipes. Tanning is performed at a workbench (CARPENTRY stand-in until
        a dedicated leatherworking skill lands).
      category: RESOURCE
      weight-per-unit: 400
      max-stack: 50
      regenerating: false

    CLOTH:
      display-name: Cloth
      description: >-
        Woven fabric from plant fiber. Substrate for cloth armor and future
        quivers / bandages.
      category: RESOURCE
      weight-per-unit: 200
      max-stack: 100
      regenerating: false

    BRICK:
      display-name: Brick
      description: >-
        Fired clay brick. Forward-compatible input for future T2/T3 building
        recipes; not consumed by Phase 1 buildings yet.
      category: RESOURCE
      weight-per-unit: 1000
      max-stack: 100
      regenerating: false

    HEALING_SALVE:
      display-name: Healing Salve
      description: >-
        Concentrated herb extract used as the alchemy substrate for HEALTH_POTION
        and future restoratives. No standalone consumption hook.
      category: RESOURCE
      weight-per-unit: 100
      max-stack: 30
      regenerating: false

    HEALTH_POTION:
      display-name: Health Potion
      description: >-
        Single-dose bottled restorative for combat phases. Consumable hook is TODO
        once an HP-regen gauge lands in the survival system; the recipe ships with
        this slice so the alchemy chain is exercisable end-to-end.
      category: RESOURCE
      weight-per-unit: 100
      max-stack: 30
      regenerating: false

# Equipment-class items live in equipment-{weapons,armor,jewelry}.yaml (same `items.catalog` key).
# All YAML files contributing to `items.catalog` are wired through
# `ItemBalanceConfiguration.@PropertySource` and merge into a single
# `Map<String, ItemProperties>` at bind time.
