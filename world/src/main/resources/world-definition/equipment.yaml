items:
  catalog:

    # ───────────────────────── Equipment (sample) ─────────────────────────────
    # Initial equipment-slice catalog. Three items cover the three classes of
    # slot occupancy the equip reducer must handle: a single-hand weapon
    # (MAIN_HAND, can dual-wield), a two-handed weapon (MAIN_HAND with off-hand
    # lock), and a head slot. Per-instance state (rarity rolls, current
    # durability, creator signature) lives on `agent_equipment_instances`;
    # these YAML entries define only the catalog ceilings.
    #
    # Equipment lives in its own file (separate from the resource catalog in
    # `items.yaml`) so the two grow independently — equipment will balloon as
    # crafting / weapon-class / armor-tier work lands, and bundling everything
    # into one file would make grep / diff harder. Both files contribute keys
    # under `items.catalog`; the Spring property binder merges them into a
    # single `Map<String, ItemProperties>` at bind time.

    RUSTY_SWORD:
      display-name: Rusty Sword
      description: >-
        A single-edged shortsword with patches of corrosion. Battered but
        serviceable as a starter weapon.
      category: EQUIPMENT
      weight-per-unit: 1500
      max-stack: 1
      regenerating: false
      max-durability: 50
      valid-slots: [MAIN_HAND]
      two-handed: false

    IRON_GREATSWORD:
      display-name: Iron Greatsword
      description: >-
        A two-handed slab of iron forged for sweeping arcs. Locks the off-hand
        while wielded. Demands real strength to swing without dropping.
      category: EQUIPMENT
      weight-per-unit: 4000
      max-stack: 1
      regenerating: false
      max-durability: 120
      valid-slots: [MAIN_HAND]
      two-handed: true
      required-attributes:
        STRENGTH: 12

    LEATHER_HELMET:
      display-name: Leather Helmet
      description: >-
        A simple boiled-leather cap. Better than going bare-headed.
      category: EQUIPMENT
      weight-per-unit: 800
      max-stack: 1
      regenerating: false
      max-durability: 60
      valid-slots: [HELMET]
      two-handed: false
