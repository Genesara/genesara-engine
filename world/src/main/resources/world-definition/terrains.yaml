# Terrain defaults: traversable=true, movement-cost-multiplier=0.5, water-source=false.
#
# `resource-spawns` lists the per-item spawn rules used when a node of this terrain
# is first painted. Each entry is rolled INDEPENDENTLY (a forest node might have WOOD
# and HERB but no BERRY). Item ids must exist in items.yaml — checked at startup by
# the spawn-rules validator. Empty/missing list = nothing gatherable on this terrain.
#
# Rule fields:
#   item:           catalog id (must exist in items.yaml)
#   spawn-chance:   probability in [0.0, 1.0] that this node has the item at all
#   quantity-range: [min, max] inclusive; rolled uniformly when spawn-chance hits
#
# `water-source: true` enables the `drink` verb on this terrain (refills THIRST
# directly, no inventory item required). Inventory water items work anywhere via
# `consume`, independent of this flag.
world:
  terrains:

    # ───────────── Forest belt ─────────────
    FOREST:
      display-name: Forest
      resource-spawns:
        - { item: WOOD,     spawn-chance: 0.7, quantity-range: [80, 200] }
        - { item: BERRY,    spawn-chance: 0.5, quantity-range: [20, 80] }
        - { item: HERB,     spawn-chance: 0.4, quantity-range: [10, 40] }
        - { item: MUSHROOM, spawn-chance: 0.25, quantity-range: [5, 25] }
    BIRCH_FOREST:
      display-name: Birch Forest
      resource-spawns:
        - { item: WOOD,  spawn-chance: 0.75, quantity-range: [100, 220] }
        - { item: BERRY, spawn-chance: 0.5, quantity-range: [20, 80] }
        - { item: HERB,  spawn-chance: 0.3, quantity-range: [10, 40] }
    RAINFOREST:
      display-name: Rainforest
      movement-cost-multiplier: 1.0
      resource-spawns:
        - { item: WOOD,     spawn-chance: 0.8, quantity-range: [120, 260] }
        - { item: HERB,     spawn-chance: 0.6, quantity-range: [20, 60] }
        - { item: MUSHROOM, spawn-chance: 0.4, quantity-range: [10, 40] }
    FOREST_EDGE:
      display-name: Forest Edge
      resource-spawns:
        - { item: WOOD,  spawn-chance: 0.5, quantity-range: [40, 120] }
        - { item: BERRY, spawn-chance: 0.6, quantity-range: [20, 80] }
        - { item: HIDE,  spawn-chance: 0.3, quantity-range: [8, 25] }
        - { item: FIBER, spawn-chance: 0.4, quantity-range: [15, 40] }
    SACRED_GROVE:
      display-name: Sacred Grove
      resource-spawns:
        - { item: WOOD, spawn-chance: 0.6, quantity-range: [60, 160] }
        - { item: HERB, spawn-chance: 0.7, quantity-range: [30, 80] }

    # ───────────── Open lands ─────────────
    PLAINS:
      display-name: Plains
      resource-spawns:
        - { item: BERRY, spawn-chance: 0.5, quantity-range: [20, 80] }
        - { item: HERB,  spawn-chance: 0.4, quantity-range: [10, 40] }
        - { item: CLAY,  spawn-chance: 0.3, quantity-range: [30, 100] }
        - { item: HIDE,  spawn-chance: 0.4, quantity-range: [10, 30] }
        - { item: FIBER, spawn-chance: 0.6, quantity-range: [20, 60] }
    MEADOW:
      display-name: Meadow
      resource-spawns:
        - { item: BERRY, spawn-chance: 0.6, quantity-range: [30, 100] }
        - { item: HERB,  spawn-chance: 0.5, quantity-range: [20, 60] }
        - { item: FIBER, spawn-chance: 0.5, quantity-range: [15, 50] }

    # ───────────── Highland / rocky ─────────────
    HILLS:
      display-name: Hills
      movement-cost-multiplier: 0.8
      resource-spawns:
        - { item: STONE, spawn-chance: 0.6, quantity-range: [50, 150] }
        - { item: HERB,  spawn-chance: 0.3, quantity-range: [10, 30] }
    FOOTHILLS:
      display-name: Foothills
      movement-cost-multiplier: 0.7
      resource-spawns:
        - { item: STONE, spawn-chance: 0.5, quantity-range: [40, 120] }
        - { item: COAL,  spawn-chance: 0.25, quantity-range: [20, 60] }
    MOUNTAIN:
      display-name: Mountain
      movement-cost-multiplier: 1.5
      resource-spawns:
        - { item: STONE, spawn-chance: 0.7, quantity-range: [60, 180] }
        - { item: ORE,   spawn-chance: 0.4, quantity-range: [30, 100] }
        - { item: COAL,  spawn-chance: 0.3, quantity-range: [30, 80] }
        - { item: GEM,   spawn-chance: 0.05, quantity-range: [3, 12] }
    ALPINE:
      display-name: Alpine
      movement-cost-multiplier: 1.4
      resource-spawns:
        - { item: STONE, spawn-chance: 0.5, quantity-range: [40, 120] }
    CLIFFSIDE:
      display-name: Cliffside
      traversable: false
    CANYON:
      display-name: Canyon
      movement-cost-multiplier: 1.0
      resource-spawns:
        - { item: STONE, spawn-chance: 0.6, quantity-range: [50, 150] }
        - { item: ORE,   spawn-chance: 0.3, quantity-range: [20, 80] }

    # ───────────── Hostile / extreme ─────────────
    DESERT:
      display-name: Desert
      movement-cost-multiplier: 1.2
      resource-spawns:
        - { item: SAND, spawn-chance: 0.7, quantity-range: [80, 200] }
    SALT_FLATS:
      display-name: Salt Flats
      movement-cost-multiplier: 0.7
      resource-spawns:
        - { item: SALT, spawn-chance: 0.6, quantity-range: [40, 120] }
    ICE_TUNDRA:
      display-name: Ice Tundra
      movement-cost-multiplier: 1.2
      resource-spawns:
        - { item: HIDE, spawn-chance: 0.5, quantity-range: [10, 30] }
    GLACIER:
      display-name: Glacier
      movement-cost-multiplier: 1.5
    VOLCANIC:
      display-name: Volcanic
      movement-cost-multiplier: 1.3
      resource-spawns:
        - { item: STONE, spawn-chance: 0.6, quantity-range: [50, 150] }
        - { item: ORE,   spawn-chance: 0.4, quantity-range: [30, 90] }
        - { item: COAL,  spawn-chance: 0.4, quantity-range: [30, 90] }

    # ───────────── Coastal / wet ─────────────
    COASTAL:
      display-name: Coastal
      water-source: true
      resource-spawns:
        - { item: BERRY, spawn-chance: 0.4, quantity-range: [20, 60] }
        - { item: FISH,  spawn-chance: 0.6, quantity-range: [30, 100] }
        - { item: SAND,  spawn-chance: 0.5, quantity-range: [40, 120] }
        - { item: SALT,  spawn-chance: 0.1, quantity-range: [10, 30] }
    SHORELINE:
      display-name: Shoreline
      water-source: true
      resource-spawns:
        - { item: SAND, spawn-chance: 0.6, quantity-range: [40, 120] }
        - { item: FISH, spawn-chance: 0.4, quantity-range: [20, 60] }
    RIVER_DELTA:
      display-name: River Delta
      movement-cost-multiplier: 0.9
      water-source: true
      resource-spawns:
        - { item: HERB, spawn-chance: 0.5, quantity-range: [20, 60] }
        - { item: FISH, spawn-chance: 0.5, quantity-range: [30, 100] }
        - { item: CLAY, spawn-chance: 0.6, quantity-range: [40, 120] }
    WETLANDS:
      display-name: Wetlands
      movement-cost-multiplier: 1.0
      water-source: true
      resource-spawns:
        - { item: HERB,  spawn-chance: 0.5, quantity-range: [20, 60] }
        - { item: CLAY,  spawn-chance: 0.5, quantity-range: [30, 100] }
        - { item: PEAT,  spawn-chance: 0.4, quantity-range: [30, 90] }
        - { item: FIBER, spawn-chance: 0.5, quantity-range: [15, 40] }
    SWAMP:
      display-name: Swamp
      movement-cost-multiplier: 1.2
      resource-spawns:
        - { item: HERB,     spawn-chance: 0.5, quantity-range: [20, 60] }
        - { item: MUSHROOM, spawn-chance: 0.4, quantity-range: [10, 40] }
        - { item: PEAT,     spawn-chance: 0.5, quantity-range: [30, 100] }

    # ───────────── Open sea ─────────────
    # Ocean tiles are non-traversable on foot. Boats unlock traversal in Phase 3,
    # at which point we'll flip `water-source: true` so a boat-equipped agent can
    # drink from the deck. Today the flag is dead while traversable: false holds.
    OCEAN:
      display-name: Ocean
      traversable: false

    # ───────────── Mystical / ruined ─────────────
    ANCIENT_RUINS:
      display-name: Ancient Ruins
      resource-spawns:
        - { item: STONE, spawn-chance: 0.5, quantity-range: [40, 120] }
    CURSED_LAND:
      display-name: Cursed Land
    CRYSTAL_CAVES:
      display-name: Crystal Caves
      resource-spawns:
        - { item: STONE, spawn-chance: 0.6, quantity-range: [50, 150] }
        - { item: ORE,   spawn-chance: 0.4, quantity-range: [30, 90] }
        - { item: GEM,   spawn-chance: 0.15, quantity-range: [5, 20] }
    BLIGHTED:
      display-name: Blighted

    # ───────────── Roads & paths (no resources, just movement) ─────────────
    DIRT_PATH:
      display-name: Dirt Path
      movement-cost-multiplier: 0.4
    GRAVEL_ROAD:
      display-name: Gravel Road
      movement-cost-multiplier: 0.3
    WOODEN_BRIDGE:
      display-name: Wooden Bridge
      movement-cost-multiplier: 0.3
    STONE_BRIDGE:
      display-name: Stone Bridge
      movement-cost-multiplier: 0.25
    TRADE_ROUTE:
      display-name: Trade Route
      movement-cost-multiplier: 0.2
