# Terrain defaults: traversable=true, movement-cost-multiplier=0.5, water-source=false.
# `gatherables` lists item ids from world-definition/items.yaml; empty/absent means
# nothing can be gathered with the basic `gather` verb (mining and other verbs land later).
# `water-source: true` enables the `drink` verb on this terrain (refills THIRST directly,
# no inventory item required). Water-bearing inventory items (waterskin etc.) work
# anywhere via `consume`, independent of this flag.
world:
  terrains:
    FOREST:
      display-name: Forest
      gatherables: [WOOD, BERRY, HERB]
    BIRCH_FOREST:
      display-name: Birch Forest
      gatherables: [WOOD, BERRY, HERB]
    RAINFOREST:
      display-name: Rainforest
      movement-cost-multiplier: 1.0
      gatherables: [WOOD, HERB]
    PLAINS:
      display-name: Plains
      gatherables: [BERRY, HERB]
    MEADOW:
      display-name: Meadow
      gatherables: [BERRY, HERB]
    HILLS:
      display-name: Hills
      movement-cost-multiplier: 0.8
      gatherables: [STONE, HERB]

    DESERT:
      display-name: Desert
      movement-cost-multiplier: 1.2
    SALT_FLATS:
      display-name: Salt Flats
      movement-cost-multiplier: 0.7
    ICE_TUNDRA:
      display-name: Ice Tundra
      movement-cost-multiplier: 1.2
    GLACIER:
      display-name: Glacier
      movement-cost-multiplier: 1.5
    VOLCANIC:
      display-name: Volcanic
      movement-cost-multiplier: 1.3
      gatherables: [STONE, ORE]

    COASTAL:
      display-name: Coastal
      gatherables: [BERRY]
      water-source: true
    RIVER_DELTA:
      display-name: River Delta
      movement-cost-multiplier: 0.9
      gatherables: [HERB]
      water-source: true
    WETLANDS:
      display-name: Wetlands
      movement-cost-multiplier: 1.0
      gatherables: [HERB]
      water-source: true
    SWAMP:
      display-name: Swamp
      movement-cost-multiplier: 1.2
      gatherables: [HERB]

    MOUNTAIN:
      display-name: Mountain
      movement-cost-multiplier: 1.5
      gatherables: [STONE, ORE]
    ALPINE:
      display-name: Alpine
      movement-cost-multiplier: 1.4
      gatherables: [STONE]
    CLIFFSIDE:
      display-name: Cliffside
      traversable: false
    CANYON:
      display-name: Canyon
      movement-cost-multiplier: 1.0
      gatherables: [STONE, ORE]

    ANCIENT_RUINS:
      display-name: Ancient Ruins
      gatherables: [STONE]
    CURSED_LAND:
      display-name: Cursed Land
    SACRED_GROVE:
      display-name: Sacred Grove
      gatherables: [WOOD, HERB]
    CRYSTAL_CAVES:
      display-name: Crystal Caves
      gatherables: [STONE, ORE]
    BLIGHTED:
      display-name: Blighted

    FOREST_EDGE:
      display-name: Forest Edge
      gatherables: [WOOD, BERRY]
    FOOTHILLS:
      display-name: Foothills
      movement-cost-multiplier: 0.7
      gatherables: [STONE]
    SHORELINE:
      display-name: Shoreline
      water-source: true

    DIRT_PATH:
      display-name: Dirt Path
      movement-cost-multiplier: 0.4
    GRAVEL_ROAD:
      display-name: Gravel Road
      movement-cost-multiplier: 0.3
    WOODEN_BRIDGE:
      display-name: Wooden Bridge
      movement-cost-multiplier: 0.3
    STONE_BRIDGE:
      display-name: Stone Bridge
      movement-cost-multiplier: 0.25
    TRADE_ROUTE:
      display-name: Trade Route
      movement-cost-multiplier: 0.2